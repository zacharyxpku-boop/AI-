version: '3.8'

services:
  wenai:
    build: .
    ports:
      - "3000:3000"
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL:-qwen-plus}
      - AI_ENDPOINT=${AI_ENDPOINT:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    volumes:
      - ./src/config/client.json:/app/src/config/client.json
    restart: unless-stopped
